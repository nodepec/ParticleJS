<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParticleJS — Test Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">PARTICLE<small>JS &nbsp;/ v1.0</small></div>
  <div class="vr"></div>
  <div class="stats">
    <div class="stat" id="s-fps">
      <span class="stat-label">FPS</span><span class="stat-value" id="v-fps">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">PARTICLES</span><span class="stat-value" id="v-parts">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">EMITTERS</span><span class="stat-value" id="v-emit">0</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">CLICK TO SPAWN · DRAG TO STREAM</div>
  </div>

  <aside class="sidebar">
    <div class="panel">
      <div class="panel-title">Preset</div>
      <div class="grid2">
        <button class="chip active" data-preset="fire"><span class="chip-icon">🔥</span>fire</button>
        <button class="chip" data-preset="sparkle"><span class="chip-icon">✨</span>sparkle</button>
        <button class="chip" data-preset="smoke"><span class="chip-icon">💨</span>smoke</button>
        <button class="chip" data-preset="snow"><span class="chip-icon">❄️</span>snow</button>
        <button class="chip" data-preset="galaxy"><span class="chip-icon">🌌</span>galaxy</button>
        <button class="chip" data-preset="confetti"><span class="chip-icon">🎊</span>confetti</button>
        <button class="chip" data-preset="explosion"><span class="chip-icon">💥</span>explosion</button>
        <button class="chip" data-preset="bubbles"><span class="chip-icon">🫧</span>bubbles</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Interaction Mode</div>
      <div class="grid2">
        <button class="chip active" data-mode="spawn"><span class="chip-icon">🎯</span>spawn</button>
        <button class="chip" data-mode="attractor"><span class="chip-icon">🧲</span>attract</button>
        <button class="chip" data-mode="repel"><span class="chip-icon">💢</span>repel</button>
        <button class="chip" data-mode="vortex"><span class="chip-icon">🌀</span>vortex</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Parameters</div>
      <div class="field">
        <div class="field-header"><span>Emission Rate</span><span class="field-val" id="l-rate">60</span></div>
        <input type="range" id="r-rate" min="1" max="200" value="60">
      </div>
      <div class="field">
        <div class="field-header"><span>Particle Life</span><span class="field-val" id="l-life">1.2s</span></div>
        <input type="range" id="r-life" min="2" max="120" value="12">
      </div>
      <div class="field">
        <div class="field-header"><span>Particle Size</span><span class="field-val" id="l-size">18</span></div>
        <input type="range" id="r-size" min="2" max="80" value="18">
      </div>
      <div class="field">
        <div class="field-header"><span>Gravity</span><span class="field-val" id="l-grav">0.0</span></div>
        <input type="range" id="r-grav" min="-200" max="200" value="0">
      </div>
      <div class="field">
        <div class="field-header"><span>Wind</span><span class="field-val" id="l-wind">0.0</span></div>
        <input type="range" id="r-wind" min="-50" max="50" value="0">
      </div>
      <div class="field">
        <div class="field-header"><span>Turbulence</span><span class="field-val" id="l-turb">0.00</span></div>
        <input type="range" id="r-turb" min="0" max="100" value="0">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Options</div>
      <div class="toggle-row">
        <span class="toggle-label">Trails</span>
        <label class="toggle"><input type="checkbox" id="o-trails"><span class="toggle-track"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Glow</span>
        <label class="toggle"><input type="checkbox" id="o-glow" checked><span class="toggle-track"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Fade Background</span>
        <label class="toggle"><input type="checkbox" id="o-fade" checked><span class="toggle-track"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Additive Blend</span>
        <label class="toggle"><input type="checkbox" id="o-additive" checked><span class="toggle-track"></span></label>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Actions</div>
      <button class="btn primary" id="b-bang">⚡ Big Bang Burst</button>
      <button class="btn" id="b-clrp">Clear Particles</button>
      <button class="btn" id="b-clre">Clear Emitters</button>
      <button class="btn danger" id="b-reset">Reset All</button>
    </div>
  </aside>
</div>

<footer>
  <div class="pulse"></div>
  <span id="footer-status">SPAWN · FIRE</span>
  <div class="keys">
    <span><kbd>SPACE</kbd> burst</span>
    <span><kbd>C</kbd> clear</span>
    <span><kbd>1–8</kbd> presets</span>
  </div>
</footer>

<script src="particle.js"></script>
<script>
(function () {
  var P = ParticleJS;
  var stageEl = document.getElementById('stage');
  var canvas  = document.getElementById('canvas');

  function syncCanvas() {
    canvas.width  = stageEl.clientWidth;
    canvas.height = stageEl.clientHeight;
  }
  syncCanvas();

  var system = new P.ParticleSystem(canvas, { maxParticles: 12000, trackPointer: true });

  var useFade = true;
  system.onBeforeDraw = function(ctx) {
    if (useFade) {
      ctx.fillStyle = 'rgba(4,6,8,0.18)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  };

  system.addBehavior(P.Behaviors.killEdges(120));

  var PRESETS = ['fire','sparkle','smoke','snow','galaxy','confetti','explosion','bubbles'];
  var preset   = 'fire';
  var mode     = 'spawn';
  var activeEm = null;
  var ixForce  = null;
  var isDown   = false;

  function getOpts() {
    return {
      rate:       +document.getElementById('r-rate').value,
      life:       +document.getElementById('r-life').value / 10,
      size:       +document.getElementById('r-size').value,
      turbulence: +document.getElementById('r-turb').value / 100,
      wind:       +document.getElementById('r-wind').value / 10,
    };
  }

  function setPreset(name) {
    preset = name;
    document.querySelectorAll('[data-preset]').forEach(function(b) {
      b.classList.toggle('active', b.dataset.preset === name);
    });
    updateStatus();
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('[data-mode]').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === m);
    });
    var hints = { spawn:'CLICK TO SPAWN · DRAG TO STREAM', attractor:'HOLD TO ATTRACT', repel:'HOLD TO REPEL', vortex:'HOLD TO VORTEX' };
    document.getElementById('hint').textContent = hints[m] || '';
    updateStatus();
  }

  function updateStatus() {
    document.getElementById('footer-status').textContent = mode.toUpperCase() + ' · ' + preset.toUpperCase();
  }

  function clearPresetForces() {
    system.forces = system.forces.filter(function(f) {
      return !(f instanceof P.GravityForce) && !(f instanceof P.WindForce) &&
             !(f instanceof P.VortexForce)  && !(f instanceof P.AttractorForce) &&
             !(f instanceof P.BuoyancyForce);
    });
  }

  function spawnAt(x, y) {
    var o = getOpts();
    var isBurst = preset === 'confetti' || preset === 'explosion';
    if (!isBurst) { system.clearEmitters(); clearPresetForces(); }
    if (preset === 'snow') {
      system.clearEmitters(); system.forces = [];
      system.usePreset('snow', 0, 0, Object.assign({ width: canvas.width }, o));
      activeEm = null;
    } else {
      system.usePreset(preset, x, y, o);
      activeEm = isBurst ? null : system.emitters[system.emitters.length - 1];
    }
  }

  function applyIxForce(x, y) {
    if (ixForce) { system.removeForce(ixForce); ixForce = null; }
    if      (mode === 'attractor') ixForce = new P.AttractorForce(x, y, 60, 180, 'linear');
    else if (mode === 'repel')     ixForce = new P.RepellerForce(x, y, 90, 180, 'linear');
    else if (mode === 'vortex')    ixForce = new P.VortexForce(x, y, 40, 180);
    if (ixForce) system.addForce(ixForce);
  }

  function releaseIx() { if (ixForce) { system.removeForce(ixForce); ixForce = null; } }

  function getXY(e) {
    var r = canvas.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  canvas.addEventListener('mousedown', function(e) {
    isDown = true; var p = getXY(e);
    if (mode === 'spawn') spawnAt(p.x, p.y); else applyIxForce(p.x, p.y);
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault(); isDown = true; var p = getXY(e);
    if (mode === 'spawn') spawnAt(p.x, p.y); else applyIxForce(p.x, p.y);
  }, { passive: false });

  canvas.addEventListener('mousemove', function(e) {
    if (!isDown) return; var p = getXY(e);
    if (mode === 'spawn' && activeEm) { activeEm.x = p.x; activeEm.y = p.y; }
    else if (ixForce) { ixForce.x = p.x; ixForce.y = p.y; }
  });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault(); if (!isDown) return; var p = getXY(e);
    if (mode === 'spawn' && activeEm) { activeEm.x = p.x; activeEm.y = p.y; }
    else if (ixForce) { ixForce.x = p.x; ixForce.y = p.y; }
  }, { passive: false });

  window.addEventListener('mouseup',  function() { isDown = false; releaseIx(); });
  window.addEventListener('touchend', function() { isDown = false; releaseIx(); });

  document.querySelectorAll('[data-preset]').forEach(function(b) {
    b.addEventListener('click', function() { setPreset(b.dataset.preset); });
  });
  document.querySelectorAll('[data-mode]').forEach(function(b) {
    b.addEventListener('click', function() { setMode(b.dataset.mode); });
  });

  function bindSlider(sid, lid, fmt) {
    var sl = document.getElementById(sid), lb = document.getElementById(lid);
    function upd() { lb.textContent = fmt(+sl.value); }
    sl.addEventListener('input', upd); upd();
  }
  bindSlider('r-rate', 'l-rate', function(v) { return Math.round(v); });
  bindSlider('r-life', 'l-life', function(v) { return (v/10).toFixed(1)+'s'; });
  bindSlider('r-size', 'l-size', function(v) { return Math.round(v); });
  bindSlider('r-grav', 'l-grav', function(v) { return (v/10).toFixed(1); });
  bindSlider('r-wind', 'l-wind', function(v) { return (v/10).toFixed(1); });
  bindSlider('r-turb', 'l-turb', function(v) { return (v/100).toFixed(2); });

  document.getElementById('o-fade').addEventListener('change', function(e) { useFade = e.target.checked; });

  document.getElementById('b-bang').addEventListener('click', function() {
    var cx = canvas.width/2, cy = canvas.height/2;
    system.usePreset('explosion', cx, cy, { count: 160 });
    setTimeout(function() { system.usePreset('confetti', cx, cy-60, { count: 100 }); }, 80);
  });
  document.getElementById('b-clrp').addEventListener('click', function() { system.clearParticles(); });
  document.getElementById('b-clre').addEventListener('click', function() { system.clearEmitters(); activeEm = null; });
  document.getElementById('b-reset').addEventListener('click', function() {
    system.clear(); system.forces = []; activeEm = null; ixForce = null;
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === ' ') { e.preventDefault(); spawnAt(canvas.width/2, canvas.height/2); }
    if (e.key === 'c' || e.key === 'C') system.clearParticles();
    var n = parseInt(e.key);
    if (n >= 1 && n <= 8) setPreset(PRESETS[n-1]);
  });

  setInterval(function() {
    document.getElementById('v-fps').textContent   = system.stats.fps;
    document.getElementById('v-parts').textContent = system.stats.particles.toLocaleString();
    document.getElementById('v-emit').textContent  = system.stats.emitters;
  }, 150);

  new ResizeObserver(function() {
    syncCanvas();
    system.width  = canvas.width;
    system.height = canvas.height;
  }).observe(stageEl);

  system.start();

  requestAnimationFrame(function() {
    syncCanvas();
    spawnAt(canvas.width/2, canvas.height * 0.6);
  });

  updateStatus();
})();
</script>
</body>
</html>
